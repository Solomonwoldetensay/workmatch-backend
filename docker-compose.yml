services:
  api:
    build:
      context: .
    container_name: workmatch-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: ${APP_PORT:-3000}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-workmatch}
      DB_USER: ${POSTGRES_USER:-workmatch_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      JWT_SECRET: ${JWT_SECRET:-change_me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      APNS_PRIVATE_KEY: ${APNS_PRIVATE_KEY:-}
      APNS_KEY_ID: ${APNS_KEY_ID:-}
      APNS_TEAM_ID: ${APNS_TEAM_ID:-}
      APNS_BUNDLE_ID: ${APNS_BUNDLE_ID:-com.weneedu.app}
    ports:
      - "${HOST_PORT:-3000}:${APP_PORT:-3000}"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:' + (process.env.PORT || 3000) + '/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  migrate:
    build:
      context: .
    profiles:
      - setup
    command: npm run setup-db
    environment:
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-workmatch}
      DB_USER: ${POSTGRES_USER:-workmatch_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      JWT_SECRET: ${JWT_SECRET:-change_me}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:18-alpine
    container_name: workmatch-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-workmatch}
      POSTGRES_USER: ${POSTGRES_USER:-workmatch_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
